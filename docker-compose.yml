services:
  xiaodu-llm-assistant:
    build: .
    container_name: xiaodu-llm-assistant
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./xiaodu.env
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: production
      DB_PATH: /app/data/app.db
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
